<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>価格表・検索｜シーズン2｜マイクラ経済ワールド</title>
<link rel="icon" href="../assets/icons/emerald.png">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/s2-theme.css">
</head>
<body data-page="s2-prices" data-depth="1" data-season="2" data-prices="data/prices-s2.json">
<div id="app">

  <section class="hero hero--page">
    <div class="hero-icons">
      <i class="mc mc-xl" style="background-image:url(../assets/icons/emerald.png)"></i>
      <i class="mc mc-xl" style="background-image:url(../assets/icons/diamond.png)"></i>
      <i class="mc mc-xl" style="background-image:url(../assets/icons/gold_ingot.png)"></i>
    </div>
    <div class="hero-kicker">SEASON 2 — PRICE LIST</div>
    <h1><span class="hero-emoji">🔎</span>価格表・検索</h1>
    <p>シーズン2の全価格をまとめて検索できます。品目名で絞り込んだり、職業・カテゴリで切り替えられます。</p>
  </section>

  <div class="callout callout--info">
    <span class="callout-ico">ℹ️</span>
    <div>シーズン2の初期価格は、シーズン1を基準に<strong>政府関連が1.5倍・その他の職業が2倍</strong>です（無料のものは無料のまま）。今後の調整はこの表に反映していきます。</div>
  </div>

  <!-- 検索ツールバー -->
  <div class="price-search" id="priceSearch">
    <input type="search" id="pq" class="price-search__input" placeholder="🔍 品目名で検索（例: ダイヤ, 修繕, トラップ）">
    <select id="pjob" class="price-search__select" aria-label="職業で絞り込み"></select>
    <span id="pcount" class="price-search__count"></span>
  </div>

  <div id="priceResults"></div>

</div>
<script src="../js/nav.js"></script>
<script src="../js/main.js"></script>
<script src="../js/prices-page.js"></script>
</body>
</html>
